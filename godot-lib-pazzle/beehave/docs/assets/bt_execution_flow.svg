<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="650" height="480" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradients & Filters -->
  <defs>
    <!-- Adjusted gradients for more saturated colors -->
    <linearGradient id="selectorGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffcccc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9999;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sequenceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ccffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#99ff99;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="conditionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ccccff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9999ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="actionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffff99;stop-opacity:1" />
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Arrow Markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff5555" />
    </marker>
    <marker id="success-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3c9d4e" />
    </marker>
    <marker id="failure-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d04a4a" />
    </marker>
    <marker id="running-arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5bd0" />
    </marker>

    <style>
      /* Base Node Styles */
      .node {
        stroke: #444;
        stroke-width: 1.5;
        filter: url(#dropShadow);
      }
      .selector  { fill: url(#selectorGradient); }
      .sequence  { fill: url(#sequenceGradient); }
      .condition { fill: url(#conditionGradient); }
      .action    { fill: url(#actionGradient); }

      /* Labels */
      .label {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 14px;
        text-anchor: middle;
        fill: #333;
        font-weight: 500;
      }

      /* Connectors and Flow Lines */
      .connector {
        stroke: #666;
        stroke-width: 1.5;
        fill: none;
      }

      /* Execution Path (red) */
      .flow {
        stroke: #ff5555;
        stroke-width: 2.5;
        fill: none;
        stroke-dasharray: 5,5;
        marker-end: url(#arrowhead);
        animation: flowDash 3s linear infinite;
      }

      /* Success (green) */
      .success {
        stroke: #3c9d4e;
        stroke-width: 2.5;
        fill: none;
        stroke-dasharray: 5,5;
        marker-end: url(#success-arrow);
        animation: flowDash 3s linear infinite;
      }

      /* Failure (red) */
      .failure {
        stroke: #d04a4a;
        stroke-width: 2.5;
        fill: none;
        stroke-dasharray: 5,5;
        marker-end: url(#failure-arrow);
      }

      /* Running (blue) */
      .running {
        stroke: #4a5bd0;
        stroke-width: 2.5;
        fill: none;
        stroke-dasharray: 5,5;
        marker-end: url(#running-arrow);
      }

      /* Flow animation keyframes */
      @keyframes flowDash {
        100% {
          stroke-dashoffset: -50;
        }
      }

      /* Legend Styles */
      .legend-box {
        fill: white;
        stroke: #ddd;
        stroke-width: 1;
        filter: url(#dropShadow);
      }
      .legend-title {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 16px;
        font-weight: bold;
        text-anchor: middle;
        fill: #333;
      }
      .legend-text {
        font-family: 'Segoe UI', Arial, sans-serif;
        font-size: 12px;
        text-anchor: start;
        fill: #333;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="650" height="480" fill="#f9f9f9" />

  <!-- Title -->
  <text x="325" y="30" text-anchor="middle" style="font-family: 'Segoe UI'; font-size:18px; font-weight:bold;">
    Simplified Behavior Tree
  </text>

  <!-- Root Selector (tries Engage first, then Patrol) -->
  <rect x="275" y="50" width="100" height="50" rx="10" ry="10" class="node selector" />
  <text x="325" y="80" class="label">Root Selector</text>

  <!-- Engage Sequence -->
  <rect x="150" y="140" width="100" height="50" rx="10" ry="10" class="node sequence" />
  <text x="200" y="170" class="label">Engage</text>

  <!-- Patrol Sequence -->
  <rect x="400" y="140" width="100" height="50" rx="10" ry="10" class="node sequence" />
  <text x="450" y="170" class="label">Patrol</text>

  <!-- Children of Engage Sequence -->

  <!-- Condition: Is Enemy Visible -->
  <rect x="150" y="230" width="100" height="50" rx="10" ry="10" class="node condition" />
  <text x="200" y="255" class="label">Is Enemy</text>
  <text x="200" y="275" class="label">Visible?</text>

  <!-- Move to Enemy -->
  <rect x="150" y="320" width="100" height="50" rx="10" ry="10" class="node action" />
  <text x="200" y="345" class="label">Move to</text>
  <text x="200" y="365" class="label">Enemy</text>

  <!-- Attack Enemy -->
  <rect x="150" y="410" width="100" height="50" rx="10" ry="10" class="node action" />
  <text x="200" y="435" class="label">Attack</text>
  <text x="200" y="455" class="label">Enemy</text>

  <!-- Patrol Action -->
  <rect x="400" y="230" width="100" height="50" rx="10" ry="10" class="node action" />
  <text x="450" y="255" class="label">Patrol</text>
  <text x="450" y="275" class="label">Area</text>

  <!-- Connectors for Engage path -->
  <!-- Root -> Engage -->
  <path d="M 325 100 L 325 120 L 200 120 L 200 140" class="flow" />

  <!-- Engage -> Condition -->
  <path d="M 200 190 L 200 210 L 200 230" class="flow" />

  <!-- Condition -> Move -->
  <path d="M 200 280 L 200 300 L 200 320" class="flow" />

  <!-- Move -> Attack -->
  <path d="M 200 370 L 200 390 L 200 410" class="flow" />

  <!-- Connectors for Patrol path -->
  <!-- Root -> Patrol -->
  <path d="M 325 100 L 325 120 L 450 120 L 450 140" class="flow" />

  <!-- Patrol -> Patrol Action -->
  <path d="M 450 190 L 450 230" class="flow" />
</svg>
