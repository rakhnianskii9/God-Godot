<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Root Node -->
  <rect x="270" y="20" width="60" height="40" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="300" y="45" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Root</text>
  
  <!-- Connecting Lines -->
  <line x1="300" y1="60" x2="300" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="80" x2="170" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="80" x2="430" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="80" x2="170" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="80" x2="300" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="80" x2="430" y2="100" stroke="#333" stroke-width="2"/>
  
  <!-- Composite Nodes -->
  <rect x="120" y="100" width="100" height="40" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="170" y="125" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Sequence</text>
  
  <rect x="250" y="100" width="100" height="40" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="300" y="125" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Selector</text>
  
  <!-- Decorator Node -->
  <rect x="380" y="100" width="100" height="40" rx="5" fill="#FF9800" stroke="#333" stroke-width="2"/>
  <text x="430" y="125" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Decorator</text>
  
  <!-- Connecting Lines to Leaf Nodes -->
  <line x1="170" y1="140" x2="170" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="160" x2="120" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="170" y1="160" x2="220" y2="160" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="160" x2="120" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="160" x2="220" y2="180" stroke="#333" stroke-width="2"/>
  
  <line x1="300" y1="140" x2="300" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="430" y1="140" x2="430" y2="180" stroke="#333" stroke-width="2"/>
  
  <!-- Leaf Nodes -->
  <rect x="80" y="180" width="80" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="120" y="205" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Action</text>
  
  <rect x="180" y="180" width="80" height="40" rx="5" fill="#9C27B0" stroke="#333" stroke-width="2"/>
  <text x="220" y="205" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Condition</text>
  
  <rect x="260" y="180" width="80" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="300" y="205" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Action</text>
  
  <rect x="390" y="180" width="80" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="430" y="205" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Action</text>
  
  <!-- Status Legend -->
  <rect x="80" y="270" width="100" height="30" rx="5" fill="#4CAF50" stroke="#333" stroke-width="1"/>
  <text x="130" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="white">SUCCESS</text>
  
  <rect x="190" y="270" width="100" height="30" rx="5" fill="#F44336" stroke="#333" stroke-width="1"/>
  <text x="240" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="white">FAILURE</text>
  
  <rect x="300" y="270" width="100" height="30" rx="5" fill="#FFC107" stroke="#333" stroke-width="1"/>
  <text x="350" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="white">RUNNING</text>
  
  <!-- Node Legend -->
  <rect x="80" y="320" width="20" height="20" rx="2" fill="#4CAF50" stroke="#333" stroke-width="1"/>
  <text x="110" y="335" font-family="Arial" font-size="12" text-anchor="start" fill="black">Root Node</text>
  
  <rect x="200" y="320" width="20" height="20" rx="2" fill="#2196F3" stroke="#333" stroke-width="1"/>
  <text x="230" y="335" font-family="Arial" font-size="12" text-anchor="start" fill="black">Composite Node</text>
  
  <rect x="350" y="320" width="20" height="20" rx="2" fill="#FF9800" stroke="#333" stroke-width="1"/>
  <text x="380" y="335" font-family="Arial" font-size="12" text-anchor="start" fill="black">Decorator Node</text>
  
  <rect x="80" y="350" width="20" height="20" rx="2" fill="#F44336" stroke="#333" stroke-width="1"/>
  <text x="110" y="365" font-family="Arial" font-size="12" text-anchor="start" fill="black">Action Node</text>
  
  <rect x="200" y="350" width="20" height="20" rx="2" fill="#9C27B0" stroke="#333" stroke-width="1"/>
  <text x="230" y="365" font-family="Arial" font-size="12" text-anchor="start" fill="black">Condition Node</text>
</svg>