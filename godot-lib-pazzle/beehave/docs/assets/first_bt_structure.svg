<svg width="500" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="400" fill="#f0f0f0"/>
  
  <!-- BeehaveTree Node -->
  <rect x="200" y="30" width="100" height="40" fill="#80ff80" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="250" y="55" font-family="Arial" font-size="12" text-anchor="middle">BeehaveTree</text>
  
  <!-- Selector Node -->
  <rect x="200" y="110" width="100" height="40" fill="#ffcc80" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="250" y="135" font-family="Arial" font-size="12" text-anchor="middle">SelectorComposite</text>
  
  <!-- Connection Line -->
  <line x1="250" y1="70" x2="250" y2="110" stroke="#000" stroke-width="2"/>
  
  <!-- Sequence Nodes -->
  <rect x="100" y="190" width="120" height="40" fill="#80ccff" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="160" y="215" font-family="Arial" font-size="12" text-anchor="middle">Attack Sequence</text>
  
  <rect x="280" y="190" width="120" height="40" fill="#80ccff" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="340" y="215" font-family="Arial" font-size="12" text-anchor="middle">Patrol Sequence</text>
  
  <!-- Connection Lines -->
  <line x1="250" y1="150" x2="160" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="150" x2="340" y2="190" stroke="#000" stroke-width="2"/>
  
  <!-- Legend -->
  <text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold">Behavior Tree Structure</text>
  <rect x="20" y="50" width="15" height="15" fill="#80ff80" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="62" font-family="Arial" font-size="12">BeehaveTree</text>
  <rect x="20" y="75" width="15" height="15" fill="#ffcc80" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="87" font-family="Arial" font-size="12">Selector</text>
  <rect x="20" y="100" width="15" height="15" fill="#80ccff" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="112" font-family="Arial" font-size="12">Sequence</text>
</svg> 