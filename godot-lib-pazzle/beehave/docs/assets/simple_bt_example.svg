<svg width="600" height="380" xmlns="http://www.w3.org/2000/svg">
  <!-- Root Node -->
  <rect x="250" y="20" width="100" height="40" rx="5" fill="#4CAF50" stroke="#333" stroke-width="2"/>
  <text x="300" y="45" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Root (Selector)</text>
  
  <!-- Connecting Lines Level 1 -->
  <line x1="300" y1="60" x2="300" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="80" x2="180" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="300" y1="80" x2="420" y2="80" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="80" x2="180" y2="100" stroke="#333" stroke-width="2"/>
  <line x1="420" y1="80" x2="420" y2="100" stroke="#333" stroke-width="2"/>
  
  <!-- Level 1 Nodes -->
  <rect x="130" y="100" width="100" height="40" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="180" y="125" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Chase Intruder</text>
  
  <rect x="370" y="100" width="100" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="420" y="125" font-family="Arial" font-size="14" text-anchor="middle" fill="white">Patrol Area</text>
  
  <!-- Chase Intruder Branch -->
  <line x1="180" y1="140" x2="180" y2="160" stroke="#333" stroke-width="2"/>
  
  <rect x="130" y="160" width="100" height="40" rx="5" fill="#9C27B0" stroke="#333" stroke-width="2"/>
  <text x="180" y="185" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Is Intruder Visible?</text>
  
  <line x1="180" y1="200" x2="180" y2="220" stroke="#333" stroke-width="2"/>
  
  <rect x="130" y="220" width="100" height="40" rx="5" fill="#2196F3" stroke="#333" stroke-width="2"/>
  <text x="180" y="245" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Attack Sequence</text>
  
  <!-- Attack Sequence Branch -->
  <line x1="180" y1="260" x2="180" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="280" x2="120" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="180" y1="280" x2="240" y2="280" stroke="#333" stroke-width="2"/>
  <line x1="120" y1="280" x2="120" y2="300" stroke="#333" stroke-width="2"/>
  <line x1="240" y1="280" x2="240" y2="300" stroke="#333" stroke-width="2"/>
  
  <rect x="70" y="300" width="100" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="120" y="325" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Move to Position</text>
  
  <rect x="190" y="300" width="100" height="40" rx="5" fill="#F44336" stroke="#333" stroke-width="2"/>
  <text x="240" y="325" font-family="Arial" font-size="12" text-anchor="middle" fill="white">Attack</text>
  
  <!-- Legend -->
  <rect x="470" y="160" width="20" height="20" rx="2" fill="#4CAF50" stroke="#333" stroke-width="1"/>
  <text x="500" y="175" font-family="Arial" font-size="12" text-anchor="start" fill="black">Root</text>
  
  <rect x="470" y="190" width="20" height="20" rx="2" fill="#2196F3" stroke="#333" stroke-width="1"/>
  <text x="500" y="205" font-family="Arial" font-size="12" text-anchor="start" fill="black">Sequence/Selector</text>
  
  <rect x="470" y="220" width="20" height="20" rx="2" fill="#9C27B0" stroke="#333" stroke-width="1"/>
  <text x="500" y="235" font-family="Arial" font-size="12" text-anchor="start" fill="black">Condition</text>
  
  <rect x="470" y="250" width="20" height="20" rx="2" fill="#F44336" stroke="#333" stroke-width="1"/>
  <text x="500" y="265" font-family="Arial" font-size="12" text-anchor="start" fill="black">Action</text>
  
  <!-- Notes-->
  <text x="360" y="185" font-family="Arial" font-size="12" text-anchor="start" fill="#444">Priority: Chase First</text>
  <text x="360" y="205" font-family="Arial" font-size="12" text-anchor="start" fill="#444">Fallback: Patrol</text>
</svg>