<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" fill="#f0f0f0"/>
  
  <!-- BeehaveTree Node -->
  <rect x="250" y="30" width="100" height="40" fill="#80ff80" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="300" y="55" font-family="Arial" font-size="12" text-anchor="middle">BeehaveTree</text>
  
  <!-- Selector Node -->
  <rect x="250" y="110" width="100" height="40" fill="#ffcc80" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="300" y="135" font-family="Arial" font-size="12" text-anchor="middle">SelectorComposite</text>
  
  <!-- Connection Line -->
  <line x1="300" y1="70" x2="300" y2="110" stroke="#000" stroke-width="2"/>
  
  <!-- Sequence Nodes -->
  <rect x="150" y="190" width="120" height="40" fill="#80ccff" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="210" y="215" font-family="Arial" font-size="12" text-anchor="middle">Attack Sequence</text>
  
  <rect x="330" y="190" width="120" height="40" fill="#80ccff" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="390" y="215" font-family="Arial" font-size="12" text-anchor="middle">Patrol Sequence</text>
  
  <!-- Connection Lines -->
  <line x1="300" y1="150" x2="210" y2="190" stroke="#000" stroke-width="2"/>
  <line x1="300" y1="150" x2="390" y2="190" stroke="#000" stroke-width="2"/>
  
  <!-- Attack Branch Leaf Nodes -->
  <rect x="70" y="270" width="100" height="40" fill="#ff9999" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="120" y="295" font-family="Arial" font-size="12" text-anchor="middle">IsPlayerVisible</text>
  
  <rect x="180" y="270" width="100" height="40" fill="#99ff99" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="230" y="295" font-family="Arial" font-size="12" text-anchor="middle">ChasePlayer</text>
  
  <rect x="290" y="270" width="100" height="40" fill="#99ff99" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="340" y="295" font-family="Arial" font-size="12" text-anchor="middle">AttackPlayer</text>
  
  <!-- Patrol Branch Leaf Nodes -->
  <rect x="400" y="270" width="100" height="40" fill="#99ff99" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="450" y="295" font-family="Arial" font-size="12" text-anchor="middle">MoveToPoint</text>
  
  <rect x="510" y="270" width="100" height="40" fill="#99ff99" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="560" y="295" font-family="Arial" font-size="12" text-anchor="middle">WaitAtPoint</text>
  
  <!-- Connection Lines -->
  <line x1="210" y1="230" x2="120" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="210" y1="230" x2="230" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="210" y1="230" x2="340" y2="270" stroke="#000" stroke-width="2"/>
  
  <line x1="390" y1="230" x2="450" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="390" y1="230" x2="560" y2="270" stroke="#000" stroke-width="2"/>
  
  <!-- Legend -->
  <text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold">Complete Behavior Tree</text>
  <rect x="20" y="50" width="15" height="15" fill="#80ff80" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="62" font-family="Arial" font-size="12">BeehaveTree</text>
  <rect x="20" y="75" width="15" height="15" fill="#ffcc80" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="87" font-family="Arial" font-size="12">Selector</text>
  <rect x="20" y="100" width="15" height="15" fill="#80ccff" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="112" font-family="Arial" font-size="12">Sequence</text>
  <rect x="20" y="125" width="15" height="15" fill="#ff9999" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="137" font-family="Arial" font-size="12">Condition</text>
  <rect x="20" y="150" width="15" height="15" fill="#99ff99" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="162" font-family="Arial" font-size="12">Action</text>
</svg> 