<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Enemy Character -->
  <rect x="100" y="100" width="80" height="80" fill="#ff8080" stroke="#000" stroke-width="2"/>
  <text x="140" y="145" font-family="Arial" font-size="12" text-anchor="middle">Enemy</text>
  
  <!-- BeehaveTree Node -->
  <rect x="220" y="100" width="100" height="40" fill="#80ff80" stroke="#000" stroke-width="2" rx="5" ry="5"/>
  <text x="270" y="125" font-family="Arial" font-size="12" text-anchor="middle">BeehaveTree</text>
  
  <!-- Connection Line -->
  <line x1="180" y1="120" x2="220" y2="120" stroke="#000" stroke-width="2"/>
  
  <!-- Legend -->
  <text x="20" y="30" font-family="Arial" font-size="16" font-weight="bold">Scene Setup</text>
  <rect x="20" y="50" width="15" height="15" fill="#ff8080" stroke="#000" stroke-width="1"/>
  <text x="45" y="62" font-family="Arial" font-size="12">Character Node</text>
  <rect x="20" y="75" width="15" height="15" fill="#80ff80" stroke="#000" stroke-width="1" rx="3" ry="3"/>
  <text x="45" y="87" font-family="Arial" font-size="12">Beehave Node</text>
</svg> 